<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPano - Video to Panorama</title>
    <link rel="stylesheet" href="https://cdn.pannellum.org/2.5/pannellum.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>OpenPano</h1>
        <p>Convert video to interactive panorama</p>
    </header>

    <main>
        <!-- Upload Section -->
        <section id="upload-section">
            <div id="drop-zone">
                <div class="drop-icon">&#9655;</div>
                <p class="drop-title">Drag & drop a video file here</p>
                <p class="drop-or">or</p>
                <label class="file-btn" for="file-input">Choose Video</label>
                <input type="file" id="file-input" accept="video/*" hidden>
                <p class="drop-hint">Supported: MP4, MOV, AVI, MKV, WebM (max 500 MB)</p>
            </div>
            <div id="upload-progress" hidden>
                <div class="progress-bar">
                    <div id="upload-fill" class="progress-fill"></div>
                </div>
                <span id="upload-percent">Uploading... 0%</span>
            </div>
            <p id="upload-error" class="error-msg" hidden></p>
        </section>

        <!-- Processing Section -->
        <section id="processing-section" hidden>
            <h2>Processing Video</h2>
            <div class="processing-card">
                <div id="stage-label">Starting pipeline...</div>
                <div class="progress-bar">
                    <div id="processing-fill" class="progress-fill"></div>
                </div>
                <div id="processing-detail" class="detail-text"></div>
                <div id="elapsed-time">Elapsed: 0s</div>
            </div>
        </section>

        <!-- Viewer Section -->
        <section id="viewer-section" hidden>
            <div id="panorama-viewer"></div>

            <div id="info-bar">
                <div id="controls-panel">
                    <h3>Controls</h3>
                    <div class="control-row">
                        <label>
                            <input type="checkbox" id="ctrl-autorotate"> Auto-Rotate
                        </label>
                        <input type="range" id="ctrl-autorotate-speed" min="-10" max="10" value="2" step="0.5" disabled>
                        <span id="ctrl-speed-label">2.0</span>
                    </div>
                    <div class="control-row">
                        <label for="ctrl-hfov">Field of View</label>
                        <input type="range" id="ctrl-hfov" min="30" max="120" value="100">
                        <span id="ctrl-hfov-label">100&deg;</span>
                    </div>
                    <div class="control-row buttons">
                        <button id="ctrl-fullscreen">Fullscreen</button>
                        <button id="ctrl-reset">Reset View</button>
                    </div>
                </div>

                <div id="metadata-panel">
                    <h3>Panorama Info</h3>
                    <div id="meta-content"></div>
                </div>
            </div>

            <div id="warnings-panel" hidden></div>

            <button id="new-pano-btn">Create Another Panorama</button>
        </section>

        <!-- Error Section -->
        <section id="error-section" hidden>
            <div class="error-card">
                <h2>Processing Failed</h2>
                <p id="error-message"></p>
                <button id="error-retry-btn">Try Again</button>
            </div>
        </section>
    </main>

    <script src="https://cdn.pannellum.org/2.5/pannellum.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
