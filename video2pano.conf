# video2pano configuration
# All values here can be overridden by CLI arguments where applicable.

[quality]
# File size threshold at 1080p (bytes). Frames below this are considered blurry.
# Scaled proportionally for other resolutions.
base_filesize_threshold = 120000
base_resolution_pixels = 2073600  # 1920 * 1080

# Laplacian variance: frames below this fraction of the median are rejected.
# Lower = more permissive. Requires OpenCV.
laplacian_ratio_threshold = 0.4

# Minimum fraction of frames that must pass sharpness to proceed.
min_sharpness_pass_rate = 0.08

[frames]
# Min/max frames to feed to the stitcher.
min_frames = 8
max_frames = 260

[camera]
# Default 35mm-equivalent focal length (mm) when metadata is unavailable.
# Most phone main cameras are 24-28mm. Set to 0 to let the stitcher guess.
default_focal_length_mm = 26

[sift]
# SIFT feature detection parameters (tuned for video frames).
# sift_working_size is capped to the video's max dimension at runtime.
sift_working_size = 1200
num_octave_high_res = 5
num_octave_low_res = 4
# Resolution threshold (max dimension) below which low-res octave count is used.
low_res_threshold = 1000

num_scale = 7
scale_factor = 1.4142135623
gauss_sigma = 1.4142135623
gauss_window_factor = 4

# Feature sensitivity. Smaller values = more features.
# High-res (>=1000px max dim):
contrast_thres_high_res = 1.5e-2
# Low-res (<1000px max dim):
contrast_thres_low_res = 1e-2

judge_extrema_diff_thres = 1e-3
edge_ratio = 12

pre_color_thres = 2e-2
calc_offset_depth = 4
offset_thres = 0.5

[matching]
ori_radius = 4.5
ori_hist_smooth_count = 2
desc_hist_scale_factor = 3
desc_int_factor = 512
match_reject_next_ratio = 0.8

[ransac]
iterations = 5000
# Base inlier threshold at 800px working size. Scaled proportionally at runtime.
base_inlier_thres = 3.5
base_inlier_resolution = 1024

inlier_in_match_ratio = 0.05
inlier_in_points_ratio = 0.02

[optimization]
straighten = 1
slope_plain = 8e-3
lm_lambda = 5
multipass_ba = 1

[output]
max_output_size = 8000
crop = 1
multiband = 0
